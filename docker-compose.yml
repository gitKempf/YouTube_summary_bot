services:
  bot:
    build: .
    env_file: .env
    environment:
      - MEM0_QDRANT_HOST=qdrant
      - MEM0_QDRANT_PORT=6333
      - MEM0_NEO4J_URL=bolt://neo4j:7687
      - WEBAPP_URL=https://neurotwin.me
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    env_file: .env
    environment:
      - MEM0_QDRANT_HOST=qdrant
      - MEM0_QDRANT_PORT=6333
      - MEM0_NEO4J_URL=bolt://neo4j:7687
    ports:
      - "8100:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${MEM0_NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7687'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  neo4j_data:
